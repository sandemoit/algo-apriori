name: Build and Push to PROD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}
            type=sha,prefix=main-,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=dev-,enable=${{ github.ref == 'refs/heads/dev' }}
            type=ref,event=pr

      - name: Extract metadata SSR image
        id: meta_ssr
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest-ssr,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=dev-ssr,enable=${{ github.ref == 'refs/heads/dev' }}
            type=sha,prefix=main-,suffix=-ssr,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=dev-,suffix=-ssr,enable=${{ github.ref == 'refs/heads/dev' }}

      - name: Build and push app Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1
          pull: true

      - name: Build and push SSR Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: ssr-runtime
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta_ssr.outputs.tags }}
          labels: ${{ steps.meta_ssr.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1
          pull: true
