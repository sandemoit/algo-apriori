name: Build and Push Production Image

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

concurrency:
  group: production-image-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build Laravel Docker Image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Pull Request hanya melakukan validasi build,
      # sehingga tidak perlu login atau push ke GHCR.
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=main-,format=short,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=pr

          labels: |
            org.opencontainers.image.title=Algo Apriori
            org.opencontainers.image.description=Laravel Apriori Analysis Application
            org.opencontainers.image.vendor=Sandemo Indo Teknologi

      - name: Build and push Docker image
        id: docker-build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile

          # Sesuai nama final stage pada Dockerfile.
          target: app-runtime

          # Server VPS Ubuntu umum berbasis AMD64.
          platforms: linux/amd64

          pull: true

          # Pull Request hanya memastikan Dockerfile berhasil dibangun.
          push: ${{ github.event_name != 'pull_request' }}

          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}

          cache-from: type=gha,scope=algo-apriori-app
          cache-to: type=gha,mode=max,scope=algo-apriori-app

      - name: Publish build summary
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          {
            echo "## Production image published"
            echo
            echo "- Image: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\`"
            echo "- Digest: \`${{ steps.docker-build.outputs.digest }}\`"
            echo "- Commit: \`${{ github.sha }}\`"
            echo
            echo "Available tags:"
            echo '```text'
            echo "${{ steps.metadata.outputs.tags }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
